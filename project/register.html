    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Noto+Sans+JP:wght@300;400;500;700&display=swap" rel="stylesheet">
</head>
<body>
<header class="navbar inner-navbar scrolled" id="navbar">

    <a href="index.html" class="logo">
        <h2>OKAYAMA UNESCO</h2>
    </a>

    <nav>
        <ul class="nav-links">
            <li><a href="index.html" data-lang="nav_home">Home</a></li>
            <li><a href="activities.html" data-lang="nav_activities">Activities</a></li>
            <li><a href="explore.html" data-lang="nav_explore">Explore</a></li>
            <li><a href="about.html" data-lang="nav_about">About</a></li>
            <li><a href="news.html" data-lang="nav_news">News</a></li>
            <li><a href="contact.html" data-lang="nav_contact">Contact</a></li>
            <li><a href="login.html" class="nav-login" data-lang="nav_login">Login</a></li>
        </ul>
    </nav>

    <div class="nav-right">
        <div class="language-switch">
            <button id="lang-ja" class="lang-btn" type="button">JA</button>
            <span>|</span>
            <button id="lang-en" class="lang-btn" type="button">EN</button>
        </div>

        <button class="menu-btn" id="menu-btn" aria-label="Open menu">
            <span></span>
            <span></span>
        </button>
    </div>

</header>

<div class="mobile-menu" id="mobile-menu">
    <a href="index.html" data-lang="nav_home">Home</a>
    <a href="activities.html" data-lang="nav_activities">Activities</a>
    <a href="explore.html" data-lang="nav_explore">Explore</a>
    <a href="about.html" data-lang="nav_about">About</a>

    <a href="contact.html" data-lang="nav_contact">Contact</a>
    <a href="login.html" data-lang="nav_login">Login</a>
</div>

<main class="auth-page">
    <section class="auth-card">
        <h1>Create Account</h1>
        <p class="auth-subtitle">Create an account for the Okayama UNESCO website. V17 is ready for Java backend connection.</p>

        <form class="auth-form" onsubmit="registerUser(event)">
            <div class="form-group">
                <label for="name">Name</label>
                <input type="text" id="name" placeholder="Your name" required>
            </div>

            <div class="form-group">
                <label for="email">Email</label>
                <input type="email" id="email" placeholder="your@email.com" required>
            </div>

            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" placeholder="Password" required>
            </div>

            <button class="auth-btn" type="submit">Create Account</button>
        </form>

        <p id="auth-message" class="auth-message"></p>
        <p class="auth-link">Already have an account? <a href="login.html">Login</a></p>
    </section>
</main>

<script src="js/navbar.js"></script>
<script src="js/language.js"></script>
<script src="js/auth.js"></script>

</body>
</html>
